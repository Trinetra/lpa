# /etc/nginx/sites-available/sms.saisanathana.com
# Symlink into sites-enabled and reload:
#   sudo ln -s /etc/nginx/sites-available/sms.saisanathana.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Let's Encrypt cert is provisioned in a separate step via:
#   sudo certbot --nginx -d sms.saisanathana.com
#
# (certbot will insert its own ssl_certificate directives; the block below is
# the desired final state.)

server {
    listen 80;
    server_name sms.saisanathana.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sms.saisanathana.com;

    ssl_certificate     /etc/letsencrypt/live/sms.saisanathana.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sms.saisanathana.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Photos / logos — the frontend uploads image files.
    client_max_body_size 10M;

    access_log /var/log/nginx/lakshmi.access.log;
    error_log  /var/log/nginx/lakshmi.error.log;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
